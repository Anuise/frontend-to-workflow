<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sample Frontend｜設定</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav>
      <a href="/">首頁</a>
      <a href="/about">關於</a>
      <a href="/settings">設定</a>
    </nav>
    <main>
      <h1>設定</h1>
      <div class="tabs" role="tablist">
        <button data-tab="個人資料" class="active" role="tab">個人資料</button>
        <button data-tab="帳號" role="tab">帳號</button>
      </div>
      <section data-panel="個人資料">
        <h2>個人資料</h2>
        <label>姓名 <input name="name" /></label>
        <label>Email <input name="email" type="email" /></label>
      </section>
      <section data-panel="帳號" hidden>
        <h2>帳號</h2>
        <label>密碼 <input name="password" type="password" /></label>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
